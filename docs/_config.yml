title: Stoolap
description: High-performance embedded SQL database written in pure Rust
theme: jekyll-theme-minimal
url: https://stoolap.io
baseurl: ""
permalink: pretty
logo: /assets/img/logo.svg
twitter:
  card: summary_large_image
github:
  repository_url: https://github.com/stoolap/stoolap

# Latest release shown in the homepage hero badge
stoolap_version: v0.4.0

# Google Analytics
google_analytics: 

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - .gitignore

# Collections for documentation
collections:
  docs:
    output: true
    permalink: /:collection/:path/
    sort_by: order
  posts:
    output: true
    permalink: /blog/:year/:month/:day/:title/

# Default layouts
defaults:
  - scope:
      path: ""
      type: "docs"
    values:
      layout: "doc"
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
    values:
      layout: "default"
      image: /assets/img/og-image.png

plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

# Syntax highlighting with Rouge
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  
highlighter: rouge